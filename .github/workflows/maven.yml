name: CI — offer-service

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: offerDB
          POSTGRES_USER: jacobo
          POSTGRES_PASSWORD: jacobo123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Test + JaCoCo
        run: mvn verify -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/offerDB
          SPRING_DATASOURCE_USERNAME: jacobo
          SPRING_DATASOURCE_PASSWORD: jacobo123

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
